name: enterprise-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security_baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pip-audit bandit detect-secrets build

      - name: Run security baseline
        run: python scripts/security_baseline.py

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: docs/release/evidence/security/

  truth_and_release_checks:
    runs-on: ubuntu-latest
    needs: [security_baseline]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build

      - name: Run canonical truth validators
        run: |
          python scripts/validate_no_placeholder_tests.py
          python scripts/validate_nexus_master_truth.py
          python scripts/validate_nexus_10_10_gate.py

      - name: Run enterprise gate
        run: python scripts/run_enterprise_gate.py

      - name: Generate release manifest
        run: python scripts/generate_release_manifest.py

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-release-evidence
          path: |
            docs/release/RELEASE_MANIFEST.json
            docs/release/ENTERPRISE_RELEASE_EVIDENCE.json
            docs/release/evidence/
            dist/

  enterprise_gate:
    runs-on: ubuntu-latest
    needs: [security_baseline, truth_and_release_checks]
    steps:
      - name: Enterprise gate summary
        run: echo "Enterprise gate checks passed"
