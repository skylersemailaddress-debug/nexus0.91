name: enterprise-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security_baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pip-audit bandit detect-secrets

      - name: Run security baseline
        run: python scripts/security_baseline.py

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: docs/release/evidence/security/

  runtime_and_release_checks:
    runs-on: ubuntu-latest
    needs: [security_baseline]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run runtime and release tests
        run: |
          python -m pytest -q \
            tests/test_real_execution_harness.py \
            tests/test_real_execution_progression_harness.py \
            tests/test_restore_release_hardening.py \
            tests/test_release_rollback_validation.py

      - name: Validate release docs
        run: |
          python scripts/validate_release_docs.py
          python scripts/validate_release_scope.py
          python scripts/validate_support_matrix.py

      - name: Generate enterprise evidence
        run: python scripts/generate_enterprise_evidence.py

      - name: Validate README truth alignment
        run: python scripts/validate_readme_claims.py

      - name: Validate enterprise evidence completeness
        run: python scripts/validate_enterprise_evidence.py --max-age-days 7

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-release-evidence
          path: |
            docs/release/ENTERPRISE_RELEASE_EVIDENCE.json
            docs/release/evidence/

  enterprise_gate:
    runs-on: ubuntu-latest
    needs: [security_baseline, runtime_and_release_checks]
    steps:
      - name: Enterprise gate summary
        run: echo "Enterprise gate checks passed"
