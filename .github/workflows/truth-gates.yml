name: truth-gates

on:
  pull_request:
  push:
    branches:
      - main
      - chore/repo-truth-cleanup

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build pytest

      - name: Generate evidence for tests
        run: |
          python scripts/run_continuity_scenarios.py
          python scripts/run_execution_scenarios.py

      - name: Run tests
        run: python -m pytest -q

      - name: Run truth gates
        run: |
          python scripts/validate_no_placeholder_tests.py
          python scripts/validate_nexus_master_truth.py
          python scripts/validate_nexus_10_10_gate.py
