name: truth-gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build

      - name: Run tests
        run: python -m pytest -q

      - name: Run truth gates
        run: |
          python - <<'PY'
          from nexus_os.governance.truth_gate import run_repo_truth_gates
          results = run_repo_truth_gates('.')
          failed = [item for item in results if not item.passed]
          for item in results:
              print(f"{item.name}: {'PASS' if item.passed else 'FAIL'} - {item.details}")
          if failed:
              raise SystemExit(1)
          PY

      - name: Packaging and import verification
        run: |
          python -m build --sdist --wheel
          python -m compileall nexus_os
          python - <<'PY'
          import nexus_os
          from nexus_os.governance.truth_gate import all_truth_gates_pass
          assert all_truth_gates_pass('.')
          print(nexus_os.__all__)
          PY
