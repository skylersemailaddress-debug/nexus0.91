name: truth-gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build pytest pytest pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Run truth gates
        run: |
          python scripts/validate_no_placeholder_tests.py
          python scripts/validate_nexus_master_truth.py
          python scripts/validate_nexus_10_10_gate.py

      - name: Packaging and import verification
        run: |
          python -m build --sdist --wheel
          python -m compileall nexus_os
          python - <<'PY'
          import nexus_os
          print(nexus_os.__all__)
          PY
