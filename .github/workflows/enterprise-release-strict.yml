name: enterprise-release-strict

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  strict_release_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pip-audit bandit detect-secrets

      - name: Run strict enterprise gate
        run: python scripts/run_enterprise_gate.py

      - name: Validate strict evidence freshness
        run: python scripts/validate_enterprise_evidence.py --max-age-days 2

      - name: Upload strict release evidence
        uses: actions/upload-artifact@v4
        with:
          name: strict-enterprise-release-evidence
          path: |
            docs/release/ENTERPRISE_RELEASE_EVIDENCE.json
            docs/release/evidence/
