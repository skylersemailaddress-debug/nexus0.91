name: master-completion-gate

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate-program:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Validate commit and diff tracking lock
        run: python scripts/validate_master_completion.py --check-git

      - name: Run non regression lock tests
        run: pytest -q tests/test_master_non_regression_lock.py

      - name: Run enterprise gate
        run: python scripts/run_enterprise_gate.py
