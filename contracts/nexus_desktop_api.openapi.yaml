openapi: 3.1.0
info:
  title: Nexus Desktop API
  version: 0.9.0
  description: Desktop product API contract for Nexus v0.9.
servers:
  - url: http://127.0.0.1:8765
paths:
  /api/health:
    get:
      summary: Health probe
      responses:
        '200':
          description: Service health
  /api/state:
    get:
      summary: Current desktop state snapshot
      security:
        - bearerAuth: []
      responses:
        '200':
          description: State payload
        '401':
          description: Unauthorized
  /api/conversation:
    post:
      summary: Submit a user turn
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        '200':
          description: Accepted turn response
        '400':
          description: Missing text
        '401':
          description: Unauthorized
  /api/mission:
    post:
      summary: Launch a mission
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [objective]
              properties:
                objective:
                  type: string
      responses:
        '200':
          description: Mission launched
        '400':
          description: Missing objective
        '401':
          description: Unauthorized
  /api/approve:
    post:
      summary: Approve a pending approval item
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                approval_id:
                  type: string
      responses:
        '200':
          description: Approval outcome
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
